<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AAC Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <main class="content" role="main">
      <!-- 로그 영역 -->
      <section class="card log-card" aria-label="선택 내역" aria-live="polite">
        <div id="logContent" class="log-content">
          <div class="log-line">내역 1</div>
          <div class="log-line">내역 2</div>
        </div>
      </section>

      <!-- 탭(메뉴) -->
      <nav class="segmented" aria-label="메뉴 탭">
        <button class="segmented-item is-active" data-tab="menu1" aria-current="page">메뉴 1</button>
        <button class="segmented-item" data-tab="menu2">메뉴 2</button>
        <button class="segmented-item" data-tab="menu3">메뉴 3</button>
      </nav>

      <!-- 리스트 -->
      <section id="list" class="list" aria-label="문장 및 단어 목록">
        <!-- JS에서 채움 -->
      </section>
    </main>

    <!-- 하단 입력창 -->
    <footer class="composer" role="contentinfo">
      <div class="card composer-card" role="group" aria-label="입력 및 즐겨찾기">
        <div class="input-row">
          <input id="textInput" type="text" inputmode="text" placeholder="텍스트 입력" aria-label="텍스트 입력" />
          <button id="actionBtn" class="icon-btn" aria-label="실행">
            <!-- 동그란 아이콘 대신 단색 버튼 (디자인 참조) -->
            <span class="sr-only">실행</span>
          </button>
        </div>
        <button id="favBtn" class="btn-secondary">즐겨찾기</button>
      </div>
      <div class="safe-area" aria-hidden="true"></div>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
